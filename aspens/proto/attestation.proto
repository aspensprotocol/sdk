syntax = "proto3";

package xyz.aspens.attestation.v1;

option optimize_for = SPEED;

service AttestationService {
  rpc GetAttestation(GetAttestationRequest) returns (GetAttestationResponse) {}
}

message GetAttestationRequest {
  // Caller-supplied freshness nonce (anti-replay). At most 64 bytes.
  //
  // NOTE: semantics narrowed (see ATTESTATION_QUOTE_DESIGN.md §4.4). The signer no
  // longer writes these bytes directly into REPORTDATA; it assembles REPORTDATA
  // server-side as SHA-512( DOMAIN || SHA256(pubkey_manifest) || SHA256(image_digests) || SHA256(report_data) ),
  // where `pubkey_manifest` is the canonical manifest binding ALL of the signer's
  // tx pubkeys and `report_data` is these bytes — so the quote binds the signing
  // keys the signer actually holds, not a single caller-supplied key. This field
  // now carries only the nonce. Kept wire-compatible (still <=64 opaque bytes);
  // rename to `nonce` at the next proto cleanup.
  optional bytes report_data = 1;
}

message GetAttestationResponse {
  AttestationReport report = 1;
}

message AttestationReport {
  // TEE TCB Security Version Number
  string tee_tcb_svn = 1;
  // Measurement of the SEAM module
  string mr_seam = 2;
  // Signer of the SEAM module
  string mr_signer_seam = 3;
  // SEAM attributes
  string seam_attributes = 4;
  // TD attributes
  string td_attributes = 5;
  // Extended feature attribute mask
  string xfam = 6;
  // Measurement of the TD
  string mr_td = 7;
  // Configuration ID
  string mr_config_id = 8;
  // Owner measurement
  string mr_owner = 9;
  // Owner configuration
  string mr_owner_config = 10;
  // Runtime measurement register 0
  string rt_mr0 = 11;
  // Runtime measurement register 1
  string rt_mr1 = 12;
  // Runtime measurement register 2
  string rt_mr2 = 13;
  // Runtime measurement register 3
  string rt_mr3 = 14;
  // Report data (user-provided data bound to the report)
  string report_data = 15;

  // --- Remotely-verifiable attestation (ATTESTATION_QUOTE_DESIGN.md) ---
  // The authoritative artifact going forward: the verifier reads measurements
  // from the *verified* quote body, not the string fields above (which are
  // deprecated and retained only for transition).

  // Raw signed TD Quote (DCAP/QVL-verifiable): ECDSA chain to the Intel SGX
  // Root CA over the TDREPORT. Empty on non-TDX / legacy builds.
  bytes raw_quote = 16;

  // Optional collateral the verifier couldn't otherwise obtain (PCK chain /
  // auxblob). Usually empty -- DCAP fetches collateral from Intel PCS/PCCS and
  // the PCK chain is embedded in the quote's certification data.
  bytes cert_chain = 17;

  // Self-reported running image digest(s) (see design §4.7). Trust rests on the
  // MRTD/RTMR measurement policy, not on this self-report.
  bytes image_digest = 18;
}
