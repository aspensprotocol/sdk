name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # actions-rust-lang/setup-rust-toolchain reads channel + components
      # from rust-toolchain.toml when `toolchain:` is omitted, so local
      # and CI use the same compiler version.
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run clippy (lib)
        run: cargo clippy -p aspens --all-targets --all-features -- -D warnings

      - name: Run clippy (CLI)
        run: cargo clippy -p aspens-cli --all-targets --all-features -- -D warnings

      - name: Run clippy (REPL)
        run: cargo clippy -p aspens-repl --all-targets --all-features -- -D warnings

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install protoc (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install protobuf

      - name: Build library
        run: cargo build -p aspens --verbose

      - name: Build CLI
        run: cargo build -p aspens-cli --verbose

      - name: Build REPL
        run: cargo build -p aspens-repl --verbose

      - name: Build library with all features
        run: cargo build -p aspens --all-features --verbose

      - name: Build CLI with admin feature
        run: cargo build -p aspens-cli --features admin --verbose

      - name: Build examples
        run: cargo build -p aspens --examples --verbose

  build-lean-signing:
    name: Build (lean signing, no-default-features)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      # The documented lean-signing path: a consumer that only needs to
      # build and sign orders, with no gRPC/RPC runtime. Guards against
      # accidental coupling of always-on modules to the `client` feature.
      - name: Build aspens --no-default-features --features evm,solana
        run: cargo build -p aspens --no-default-features --features evm,solana --verbose

      - name: Test aspens --no-default-features --features evm,solana
        run: cargo test -p aspens --no-default-features --features evm,solana --verbose

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run library tests
        run: cargo test -p aspens --verbose

      - name: Run library tests with all features
        run: cargo test -p aspens --all-features --verbose

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Check documentation
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  check-dependencies:
    name: Check Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        run: cargo audit

  all-checks-complete:
    name: All Checks Complete
    needs: [fmt, clippy, build, build-lean-signing, test, doc]
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: echo "All CI checks passed successfully!"
